<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Makes site responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Description for SEO -->
    <meta name="description" content="HTML media elements example">

    <title>HTML Media Example</title>
</head>

<body>

    <!-- Heading -->
    <h1>HTML Media Demo</h1>

    <!-- Link -->
    <h2>Link</h2>
    <a href="https://www.wikipedia.org/" target="_blank" title="Go to Wikipedia">
        Visit Wikipedia
    </a>

    <!-- Image -->
    <h2>Image</h2>
    <img 
        src="https://cdn.pixabay.com/photo/2015/04/19/08/32/flower-729510_1280.jpg"
        alt="Flower Image"
        title="Beautiful Flower"
        width="300"
    >

    <!-- Audio -->
    <h2>Audio</h2>
    <audio controls loop>
        <source src="https://www.dofactory.com/media/epic.mp3" type="audio/mpeg">
        Your browser does not support audio
    </audio>

    <!-- Video -->
    <h2>Video</h2>
    <video controls width="400" muted loop>
        <source src="https://www.dofactory.com/media/movie.mp4" type="video/mp4">
        Your browser does not support video
    </video>

    <!-- Iframe -->
    <h2>Iframe</h2>
    <iframe 
        src="https://www.wikipedia.org/" 
        width="600" 
        height="400">
    </iframe>

</body>
</html>
