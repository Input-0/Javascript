<html>
    <head></head>

    <body>
        <form>
           <fieldset>
            <legend>LOGIN-Form</legend>
             <label>
                NAME:<input type="text" placeholder="enter your name" id="Username" name="username" required>
            </label>
            <label>
                Email:<input type="email" placeholder="enter your email" id="email" name="useremail" required>
            </label>
            <label >
                <input type="password" placeholder="passwer" id="userpass" name="userpassword">
            </label>
            <label>
                Hobbies:
                <input type="checkbox" value="cricket" name="hobbie" id="criect">:cricket
                <input type="checkbox" value="football" name="hobbie" id="football">:cricket
            </label>
            <label >
                Gendre:
                <input type="radio" value="male" name="gender" id="male">Male
                <input type="radio" value="female" name="gender" id="female">Female
            </label>
            <select name="city" id="city">
                <option value="" disabled selected>Select your city</option>
                <option value="shimla">shimla</option>
                <option value="chandigrah">chandigrah</option>
            </select>

            <input type="file">
            <input type="color">
            <input type="month">
            <input type="search">

            <input type="range" min="10" max="15">
            <textarea name="address" id="address" col="40" rows="10"></textarea>
            <button type="submit">submit</button>
            <button type="reset">reset</button>
           </fieldset>
        </form>
    </body>
</html>
